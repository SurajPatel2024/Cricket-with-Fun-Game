<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alag Hi level ka 🎮</title>
    <style>
        body {
            background-color: #1a1a1a; color: #fff;
            display: flex; flex-direction: column; justify-content: flex-start; align-items: center;
            height: 100vh; margin: 0; font-family: 'Courier New', Courier, monospace;
            overflow: hidden; touch-action: manipulation; padding-top: 20px;
        }
        
        #restartBtn {
            background: #ff4444; color: white; border: 2px solid white;
            width: 50px; height: 50px; font-size: 28px; cursor: pointer;
            margin-bottom: 15px; border-radius: 50%; font-family: inherit;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px #900; outline: none;
        }
        #restartBtn:active { transform: translateY(2px) rotate(-90deg); box-shadow: 0 2px #900; }

        #game-container { position: relative; border: 4px solid #fff; background: #000; }
        canvas { display: block; image-rendering: pixelated; max-width: 95vw; }
        .hud { position: absolute; top: 10px; width: 100%; display: flex; justify-content: space-around; font-weight: bold; z-index: 10; font-size: 14px; text-shadow: 2px 2px #000; }
        
        .controls { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; width: 100%; align-items: center; }
        .btn-hit {
            background: #fff; color: #000; border: none; width: 85%; max-width: 320px; padding: 22px;
            font-size: 26px; font-family: 'Courier New', Courier, monospace; font-weight: bold; border-radius: 15px; cursor: pointer; box-shadow: 0 6px #888;
        }
        .btn-hit:active { transform: translateY(4px); box-shadow: none; background: #ddd; }
        
        #announcer {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            font-size: 30px; font-weight: bold; opacity: 0; transition: opacity 0.2s; text-align: center; z-index: 20;
        }
        .stats-footer { font-size: 14px; color: #aaa; margin-top: 10px; display: flex; gap: 20px; align-items: center; }
    </style>
</head>
<body>


    <button id="restartBtn" title="Reset Match">&#10227;</button>

    <div class="stats-footer">
        <span>BEST: <span id="hi">0</span></span>

        <button onclick="clearBest()" style="background:none; border:1px solid #444; color:#666; font-size:10px; padding:2px 5px; cursor:pointer;">CLEAR BEST</button>
               
    </div>
            <h6>Developed with ❤️ by Suraj Patel</h6>
<br>

    <div id="game-container">
        <div class="hud">
            <span>RUNS: <span id="score">0</span></span>
            <span>OUTS: <span id="outCount">0</span></span>
            <span>BALLS: <span id="balls">0/12</span></span>
        </div>
        <div id="announcer">OUT</div>
        <canvas id="c"></canvas>
    </div>

    <div class="controls">
        <div id="msg" style="color:#0f0; height: 20px;">READY...</div>
        <button class="btn-hit" id="hitBtn">HIT !</button>
    </div>



    <script>
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const outEl = document.getElementById('outCount');
        const ballsEl = document.getElementById('balls');
        const hiEl = document.getElementById('hi');
        const msgEl = document.getElementById('msg');
        const announcer = document.getElementById('announcer');
        const hitBtn = document.getElementById('hitBtn');
        const restartBtn = document.getElementById('restartBtn');

        canvas.width = 400; canvas.height = 200;

        // --- SOUNDS ---
        const sfx = {
            hit: new Audio('https://res.cloudinary.com/dcuaulrax/video/upload/v1775644325/yooooooooooooooooooooooooo_4_objp8XX_dfqizk.mp3'),
            out: new Audio('https://res.cloudinary.com/dcuaulrax/video/upload/v1775553131/dry-fart_hzclda.mp3'),
            bounce: new Audio('https://res.cloudinary.com/dcuaulrax/video/upload/v1775553463/cricket_bat_sound_wik8ax.mp3'),
            swing: new Audio('A.mp3'),
            boundary: new Audio('4.mp3'),
            highScore: new Audio('https://res.cloudinary.com/dcuaulrax/video/upload/v1775552881/matlab-wo-alag-hi-level-ka-banda-tha_r6iq2z.mp3'),
            celebrate: new Audio('https://res.cloudinary.com/dcuaulrax/video/upload/v1775643549/tudum-tedev_dkic9b.mp3') // Aapka favorite celebration sound yahan lagayein
        };

        function playMP3(name) {
            if (sfx[name]) {
                sfx[name].currentTime = 0;
                sfx[name].play().catch(e => {});
            }
        }

        let hi = localStorage.getItem('cricketHiScore') || 0;
        hiEl.innerText = hi;

        function updateBest(newScore) {
            if (newScore > hi) {
                hi = newScore;
                hiEl.innerText = hi;
                localStorage.setItem('cricketHiScore', hi);
            }
        }

        function clearBest() {
            if(confirm("Reset High Score?")) {
                localStorage.removeItem('cricketHiScore');
                hi = 0; hiEl.innerText = 0;
            }
        }

        let score = 0, outs = 0, shake = 0, ballsBowled = 0;
        let totalBalls = 12; 
        let highscoreBeaten = false; 
        let bowlerCelebrating = false; // Bowler ki state
        
        let ball = { x: 0, y: 0, vx: 0, vy: 0, active: false, timer: 0, state: 'WAITING_AUTO' };
        let player = { x: 80, y: 170, swinging: false, frame: 0, swingsUsed: 0 };
        
        let wickets = [
            { ox: 40, x: 40, y: 135, vx: 0, vy: 0, angle: 0, flying: false },
            { ox: 45, x: 45, y: 135, vx: 0, vy: 0, angle: 0, flying: false },
            { ox: 50, x: 50, y: 135, vx: 0, vy: 0, angle: 0, flying: false }
        ];

        function announce(text, color, long=false) {
            announcer.innerText = text; announcer.style.color = color;
            announcer.style.opacity = "1";
            setTimeout(() => announcer.style.opacity = "0", long ? 3000 : 1000);
        }

        function resetWickets() {
            wickets.forEach((w) => { w.x = w.ox; w.y = 135; w.vx = 0; w.vy = 0; w.angle = 0; w.flying = false; });
            bowlerCelebrating = false; // Nayi ball par celebration band
        }

        function fullReset() {
            score = 0; outs = 0; ballsBowled = 0; highscoreBeaten = false;
            bowlerCelebrating = false;
            scoreEl.innerText = "0"; outEl.innerText = "0"; 
            ballsEl.innerText = "0/" + totalBalls;
            ball.state = 'WAITING_AUTO'; ball.active = false;
            player.swingsUsed = 0; hitBtn.disabled = false;
            resetWickets();
            announce("NEW MATCH", "#0ff");
        }

        function drawWickets() {
            ctx.strokeStyle = "white"; ctx.lineWidth = 2;
            wickets.forEach(w => {
                ctx.save(); ctx.translate(w.x, w.y); ctx.rotate(w.angle);
                ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, 35); ctx.stroke(); ctx.restore();
                if (w.flying) {
                    w.x += w.vx; w.y += w.vy; w.vy += 0.4; w.angle += 0.2;
                    if (w.y > 170) { w.y = 170; w.vx *= 0.5; w.vy = 0; w.angle = 1.5; }
                }
            });
        }

        function drawStickman(x, y, type, frame) {
            ctx.strokeStyle = "white"; ctx.lineWidth = 2;
            let offset = 0;
            
            // Bowler celebration ke liye jumping effect
            if(type === 'bowler' && bowlerCelebrating) {
                offset = Math.abs(Math.sin(Date.now() / 100)) * 10;
            }

            let curY = y - offset;

            // Legs
            ctx.beginPath(); ctx.moveTo(x-4, curY); ctx.lineTo(x, curY-15); ctx.lineTo(x+4, curY); ctx.stroke();
            // Torso
            ctx.beginPath(); ctx.moveTo(x, curY-15); ctx.lineTo(x, curY-35); ctx.stroke();
            // Head
            ctx.beginPath(); ctx.arc(x, curY-40, 4, 0, Math.PI*2); ctx.stroke();

            if(type === 'batter') {
                ctx.save(); ctx.translate(x, curY-28);
                let angle = player.swinging ? 0.8 - (frame * 0.5) : 0.8;
                ctx.rotate(angle);
                ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(12, 8); ctx.stroke(); 
                ctx.fillStyle = "white"; ctx.fillRect(10, 0, 4, 25); 
                ctx.restore();
            } else {
                // Arms for Bowler
                if(bowlerCelebrating) {
                    // Dono haath upar khushi mein
                    ctx.beginPath(); ctx.moveTo(x, curY-30); ctx.lineTo(x-12, curY-45); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(x, curY-30); ctx.lineTo(x+12, curY-45); ctx.stroke();
                } else {
                    // Normal position
                    ctx.beginPath(); ctx.moveTo(x, curY-30); ctx.lineTo(x-10, curY-40); ctx.stroke();
                }
            }
        }

        restartBtn.addEventListener('click', fullReset);

        hitBtn.addEventListener('click', () => {
            if (ball.state !== 'FINISHED' && player.swingsUsed < 2) {
                player.swinging = true; player.frame = 8;
                player.swingsUsed++;
                playMP3('swing');
                if (player.swingsUsed >= 2) hitBtn.disabled = true;
            }
        });

        function update() {
            let sx = (Math.random()-0.5)*shake; let sy = (Math.random()-0.5)*shake;
            shake *= 0.8; ctx.setTransform(1,0,0,1,sx,sy);
            ctx.fillStyle = "black"; ctx.fillRect(0,0,400,200);
            ctx.beginPath(); ctx.strokeStyle="white"; ctx.moveTo(0, 172); ctx.lineTo(400, 172); ctx.stroke();
            
            drawWickets();
            drawStickman(player.x, player.y, 'batter', 8 - player.frame);
            drawStickman(350, 170, 'bowler', 0);

            if (ball.state === 'WAITING_AUTO' && ballsBowled < totalBalls) {
                ball.state = 'PREPARING'; ball.timer = 80; resetWickets();
                player.swingsUsed = 0; hitBtn.disabled = false;
            }

            if (ball.state === 'PREPARING') {
                ball.timer--;
                if (ball.timer <= 0) {
                    ball.state = 'BOWLING'; ball.active = true; ballsBowled++;
                    ballsEl.innerText = ballsBowled + "/" + totalBalls;
                    ball.x = 340; ball.y = 135; ball.vx = -4.5 - (Math.random() * 2.5); ball.vy = -1.2;
                }
            }

            if (ball.active) {
                ball.x += ball.vx; ball.y += ball.vy; ball.vy += 0.15;
                if (ball.y > 168) { ball.y = 168; ball.vy *= -0.7; playMP3('bounce'); }

                if (player.swinging && ball.x < (player.x + 20) && ball.x > (player.x - 10) && Math.abs(ball.y - 150) < 40 && ball.vx < 0) {
                    playMP3('hit');
                    ball.vx = 8 + Math.random()*5; ball.vy = -5 - Math.random()*6;
                    let isSix = ball.vy < -9.5;
                    score += isSix ? 6 : 4; scoreEl.innerText = score;
                    shake = 15; ball.state = 'BALL_FLYING';
                    announce(isSix ? "SIXER!" : "FOUR!", isSix ? "#0f0" : "#ff0");
                    playMP3('boundary');

                    if (score > hi && hi > 0 && !highscoreBeaten) {
                        highscoreBeaten = true;
                        playMP3('highScore');
                        announce("NEW BEST!", "#f0f");
                    }
                    updateBest(score);
                }

                if (ball.x < 55 && ball.state === 'BOWLING') {
                    playMP3('out');
                    playMP3('celebrate'); // Bowler celebration sound
                    bowlerCelebrating = true; // Animation trigger
                    wickets.forEach((w) => { w.flying = true; w.vx = -2 - Math.random()*4; w.vy = -4 - Math.random()*6; });
                    outs++; outEl.innerText = outs;
                    ball.state = 'BALL_MISSED';
                    announce("OUT!", "red");
                }

                if (ball.x > 410 || ball.y < -100 || ball.x < -20) { 
                    ball.active = false; 
                    if (ballsBowled >= totalBalls) {
                        ball.state = 'FINISHED';
                        updateBest(score);
                        announce(`OVER!\nSCORE: ${score}`, "#fff", true);
                    } else {
                        ball.state = 'WAITING_AUTO';
                    }
                }
                ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(ball.x, ball.y, 3, 0, Math.PI*2); ctx.fill();
            }

            if (player.swinging) { player.frame--; if (player.frame <= 0) player.swinging = false; }
            requestAnimationFrame(update);
        }
        update();
    </script>
</body>
</html>
